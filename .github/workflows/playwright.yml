name: Playwright E2E Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.yml"
      - "**.json"
      - "!package.json"
      - "!apps/app/package.json"
      - "!**/workflows/**"
      - "!**/vitest.config.*"
      - "LICENSE"
      - ".gitignore"
      - ".husky/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.yml"
      - "**.json"
      - "!package.json"
      - "!apps/app/package.json"
      - "!**/workflows/**"
      - "!**/vitest.config.*"
      - "LICENSE"
      - ".gitignore"
      - ".husky/**"

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest with coverage
        run: pnpm -C apps/app test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/app/coverage/
          retention-days: 7

  e2e:
    needs: [unit-tests]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rihlamate
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'rihlamate' }}
          POSTGRES_DB: rihlamate_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rihlamate -d rihlamate_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://rihlamate:rihlamate@localhost:5432/rihlamate_dev
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'ci-test-secret-key-for-build-only' }}
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Generate DB migrations
        run: |
          pnpm db:generate
          cd apps/app && npx drizzle-kit migrate
        env:
          DATABASE_URL: postgres://rihlamate:rihlamate@localhost:5432/rihlamate_dev

      - name: Seed test user
        run: pnpm tsx scripts/playwright-seed.ts

      - name: Seed packages and bookings
        run: pnpm tsx src/lib/db/seed.ts
        working-directory: apps/app

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: rtk playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shardIndex }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

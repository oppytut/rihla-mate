name: Playwright Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rihlamate
          POSTGRES_PASSWORD: rihlamate_dev
          POSTGRES_DB: rihlamate_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rihlamate -d rihlamate_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://rihlamate:rihlamate_dev@localhost:5432/rihlamate_dev
      BETTER_AUTH_SECRET: test-secret-for-ci
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate DB migrations
        run: |
          pnpm db:generate
          pnpm db:migrate

      - name: Seed test database
        run: pnpm tsx scripts/playwright-seed.ts

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Playwright smoke tests
        run: pnpm exec playwright test --config playwright.config.ts

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

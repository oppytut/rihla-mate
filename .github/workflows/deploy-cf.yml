name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "!apps/app/package.json"
      - "!**/workflows/**"
      - "!**/vitest.config.*"
      - "LICENSE"
      - ".gitignore"
      - ".husky/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migrate app database (Neon)
        # Migrations are committed under apps/app/drizzle/ (stable tags/hashes).
        # Do NOT run db:generate in CI — random tags re-apply CREATE TABLE on Neon.
        # Prefer DATABASE_URL_UNPOOLED (direct) when non-empty; else DATABASE_URL.
        # Missing secrets become "" in Actions — migrate.ts treats empty as unset.
        run: pnpm db:migrate:neon
        working-directory: apps/app
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}

      - name: Build for Cloudflare Workers
        run: pnpm build:cf
        working-directory: apps/app
        env:
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/db
          BETTER_AUTH_SECRET: ci-build-only-not-used-at-runtime

      - name: Create R2 bucket (idempotent)
        run: |
          set -e
          BUCKET="rihla-mate-opennext-cache"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X GET "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets/$BUCKET" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "R2 bucket '$BUCKET' already exists, skipping creation"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "Creating R2 bucket '$BUCKET'..."
            curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$BUCKET\"}"
            echo ""
            echo "R2 bucket '$BUCKET' created"
          else
            echo "Unexpected response (HTTP $HTTP_CODE):"
            echo "$RESPONSE" | head -n -1
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Deploy first so wrangler.jsonc vars win over stale plain-text bindings.
      # Secrets (DATABASE_URL, LICENSE_*, BETTER_AUTH_SECRET) must NOT be plain vars
      # (secret put fails with code 10053 if a same-name plain var exists).
      - name: Deploy to Cloudflare Workers (production)
        run: pnpm deploy:cf:prod
        working-directory: apps/app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set secrets for production environment
        run: |
          set -euo pipefail
          set_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              echo "Setting $name secret..."
              echo "$value" | npx wrangler secret put "$name" --env production
            else
              echo "::warning::GitHub secret for $name is empty — skipping"
            fi
          }

          set_secret "DATABASE_URL" "$DATABASE_URL"
          set_secret "BETTER_AUTH_SECRET" "$BETTER_AUTH_SECRET"
          set_secret "LICENSE_KEY" "$LICENSE_KEY"
          set_secret "LICENSE_SERVER_URL" "$LICENSE_SERVER_URL"
          set_secret "LICENSE_PUBLIC_KEY" "$LICENSE_PUBLIC_KEY"
          set_secret "LICENSE_API_KEY" "$LICENSE_API_KEY"
        working-directory: apps/app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          LICENSE_KEY: ${{ secrets.LICENSE_KEY }}
          LICENSE_SERVER_URL: ${{ secrets.LICENSE_SERVER_URL }}
          LICENSE_PUBLIC_KEY: ${{ secrets.LICENSE_PUBLIC_KEY }}
          LICENSE_API_KEY: ${{ secrets.LICENSE_API_KEY }}

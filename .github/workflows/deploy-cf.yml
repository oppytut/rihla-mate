name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "!apps/app/package.json"
      - "!**/workflows/**"
      - "!**/vitest.config.*"
      - "LICENSE"
      - ".gitignore"
      - ".husky/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare Workers
        run: pnpm build:cf
        working-directory: apps/app
        env:
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/db
          BETTER_AUTH_SECRET: ci-build-only-not-used-at-runtime

      - name: Create R2 bucket (idempotent)
        run: |
          set -e
          BUCKET="rihla-mate-opennext-cache"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X GET "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets/$BUCKET" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "R2 bucket '$BUCKET' already exists, skipping creation"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "Creating R2 bucket '$BUCKET'..."
            curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$BUCKET\"}"
            echo ""
            echo "R2 bucket '$BUCKET' created"
          else
            echo "Unexpected response (HTTP $HTTP_CODE):"
            echo "$RESPONSE" | head -n -1
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set secrets for production environment
        run: |
          if [ -n "$DATABASE_URL" ]; then
            echo "Setting DATABASE_URL secret..."
            echo "$DATABASE_URL" | npx wrangler secret put DATABASE_URL --env production
          fi
          if [ -n "$LICENSE_KEY" ]; then
            echo "Setting LICENSE_KEY secret..."
            echo "$LICENSE_KEY" | npx wrangler secret put LICENSE_KEY --env production
          fi
          if [ -n "$LICENSE_SERVER_URL" ]; then
            echo "Setting LICENSE_SERVER_URL secret..."
            echo "$LICENSE_SERVER_URL" | npx wrangler secret put LICENSE_SERVER_URL --env production
          fi
        working-directory: apps/app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LICENSE_KEY: ${{ secrets.LICENSE_KEY }}
          LICENSE_SERVER_URL: ${{ secrets.LICENSE_SERVER_URL }}

      - name: Deploy to Cloudflare Workers (production)
        run: pnpm deploy:cf:prod
        working-directory: apps/app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

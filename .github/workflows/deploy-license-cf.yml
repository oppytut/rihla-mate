name: Deploy License Server to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "license-server/src/**"
      - "license-server/package.json"
      - "license-server/wrangler.jsonc"
      - ".github/workflows/deploy-license-cf.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set secrets for production environment
        run: |
          if [ -n "$DATABASE_URL" ]; then
            echo "Setting DATABASE_URL secret..."
            echo "$DATABASE_URL" | npx wrangler secret put DATABASE_URL --env production
          fi
          if [ -n "$LICENSE_PRIVATE_KEY" ]; then
            echo "Setting LICENSE_PRIVATE_KEY secret..."
            echo "$LICENSE_PRIVATE_KEY" | npx wrangler secret put LICENSE_PRIVATE_KEY --env production
          fi
          if [ -n "$UPSTASH_REDIS_URL" ]; then
            echo "Setting UPSTASH_REDIS_URL secret..."
            echo "$UPSTASH_REDIS_URL" | npx wrangler secret put UPSTASH_REDIS_URL --env production
          fi
          if [ -n "$UPSTASH_REDIS_TOKEN" ]; then
            echo "Setting UPSTASH_REDIS_TOKEN secret..."
            echo "$UPSTASH_REDIS_TOKEN" | npx wrangler secret put UPSTASH_REDIS_TOKEN --env production
          fi
        working-directory: license-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.LICENSE_DATABASE_URL }}
          LICENSE_PRIVATE_KEY: ${{ secrets.LICENSE_PRIVATE_KEY }}
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}

      - name: Deploy to Cloudflare Workers (production)
        run: npx wrangler deploy --env production
        working-directory: license-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

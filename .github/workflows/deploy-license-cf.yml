name: Deploy License Server to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "license-server/src/**"
      - "license-server/package.json"
      - "license-server/wrangler.jsonc"
      - ".github/workflows/deploy-license-cf.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set secrets for production environment
        run: |
          MISSING=0
          set_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              echo "Setting $name secret..."
              echo "$value" | pnpm exec wrangler secret put "$name" --env production
            else
              echo "::warning::GitHub secret for $name is empty — worker will deploy but runtime may fail until it is set"
              MISSING=1
            fi
          }

          set_secret "DATABASE_URL" "$DATABASE_URL"
          set_secret "LICENSE_PRIVATE_KEY" "$LICENSE_PRIVATE_KEY"
          set_secret "UPSTASH_REDIS_URL" "$UPSTASH_REDIS_URL"
          set_secret "UPSTASH_REDIS_TOKEN" "$UPSTASH_REDIS_TOKEN"

          if [ "$MISSING" = "1" ]; then
            echo "Missing secrets (optional for first deploy): LICENSE_DATABASE_URL, LICENSE_PRIVATE_KEY, UPSTASH_REDIS_URL, UPSTASH_REDIS_TOKEN"
          fi
        working-directory: license-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.LICENSE_DATABASE_URL }}
          LICENSE_PRIVATE_KEY: ${{ secrets.LICENSE_PRIVATE_KEY }}
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}

      - name: Deploy to Cloudflare Workers (production)
        run: pnpm deploy:cf:prod
        working-directory: license-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

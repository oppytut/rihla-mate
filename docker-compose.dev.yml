services:
  db:
    image: postgres:16-alpine
    container_name: rihla-mate-db-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=rihlamate
      - POSTGRES_PASSWORD=rihlamate_dev
      - POSTGRES_DB=rihlamate
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rihlamate -d rihlamate"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  license-server:
    build:
      context: ./license-server
    container_name: rihla-mate-license-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://rihlamate:rihlamate_dev@db:5432/rihlamate
      - REDIS_URL=${REDIS_URL:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata_dev:
